name: ci

on:
  push:
    branches: ["master", "dev"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v2

    - name: Intall Deno
      uses: denoland/setup-deno@v1
      with:
        deno-version: v1.x

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt,clippy
    - name: Toolchain Information
      run: |
        rustc --version
        rustfmt --version
        rustup --version
        cargo --version


